name: Run Python Crawler Every 3 Minutes

on:
  schedule:
    - cron: "0 0 1 * *" # 每 5 分鐘（UTC 時區）
  workflow_dispatch: # 手動觸發（可選）

permissions:
  contents: write

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    environment: STEP_TW
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TOKEN: ${{ secrets.USA_STEP_SECRET }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug environment variables
        run: |
          echo "TELEGRAM_BOT_TOKEN length: ${#TELEGRAM_BOT_TOKEN}"
          echo "TELEGRAM_CHAT_ID length: ${#TELEGRAM_CHAT_ID}"
          echo "TOKEN length: ${#TOKEN}"

      - name: Run crawler
        run: python evacuate_tw.py

      - name: Commit and push result
        run: |
          git config --global user.name "godknowspe@gmail.com"
          git config --global user.email "godknowspe@gmail.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/godknowspe/STEP_TW.git
          git checkout main
          git add . -u
          git commit -m "Update result" || echo "No changes to commit"
          git push --force origin main
